<div id="sales-ai-widget-container"></div>
<script>
    (function() {
        // CORRECCIÓN: Se agregó el https:// y se hace global
        const RAILWAY_URL = "https://web-production-73303.up.railway.app"; 
        window.RAILWAY_URL = RAILWAY_URL;

        const container = document.getElementById('sales-ai-widget-container');
        fetch(`${RAILWAY_URL}/static/index.html`)
            .then(response => response.text())
            .then(html => {
                // Inyectamos el HTML de forma segura
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Cargamos el CSS de Railway
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = `${RAILWAY_URL}/static/style.css`;
                document.head.appendChild(link);

                // Cargamos el Script de Railway
                const script = document.createElement('script');
                script.src = `${RAILWAY_URL}/static/chat.js`;
                script.defer = true;
                
                // Inyectamos el contenido del body del widget
                const widgetBody = doc.body.innerHTML;
                container.innerHTML = widgetBody;
                document.body.appendChild(script);
            });
    })();
</script>
