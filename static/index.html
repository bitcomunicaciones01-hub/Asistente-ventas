<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce con Asistente IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="hero">
        <h1>Bienvenido a Nuestra Tienda Premium</h1>
        <p>Explora el catálogo y pregúntale a nuestro asistente lo que necesites.</p>
    </div>

    <!-- Botón del Chat Widget con Logo Original Animado -->
    <button id="chat-button" class="chat-bubble" aria-label="Abrir asistente">
        <div class="chat-label">1</div>
        <div class="chat-greeting">🤖 ¡Hola! ¿Te ayudo?</div>
        <img id="bubble-logo" src="" alt="Asistente Bit" style="width: 100%; height: 100%; object-fit: contain;">
    </button>

    <!-- Ventana del Chat -->
    <div id="chat-window" class="chat-window hidden">
        <div class="chat-header">
            <div class="bot-info">
                <div class="avatar">
                    <img id="bot-logo" src="" alt="Robot Asistente" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div>
                    <h3>Piter — Asistente IA 🤖</h3>
                    <p><span class="online-dot"></span> En línea · Bit Comunicaciones</p>
                </div>
            </div>
            <button id="close-chat" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer; opacity:0.7; transition:opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">×</button>
        </div>
        
        <div id="chat-messages" class="chat-messages">
            <div class="message bot">
                ¡Hola! Soy tu asistente personal de ventas. ¿En qué puedo ayudarte hoy para encontrar el producto ideal?
            </div>
        </div>

        <div class="chat-input-area">
            <button id="mic-btn" style="background:none; border:none; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; padding: 0; min-width: 30px; flex-shrink: 0; transition: background-color 0.3s; border-radius: 50%;" title="Enviar nota de voz">
                🎤
            </button>
            <input type="text" id="user-input" placeholder="Pregúntame algo..." autocomplete="off">
             <button id="send-btn" style="background:none; border:none; color: white !important; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; padding: 0; min-width: 30px; flex-shrink: 0;">
                ➤
            </button>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
