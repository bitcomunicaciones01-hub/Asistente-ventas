<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce con Asistente IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="hero">
        <h1>Bienvenido a Nuestra Tienda Premium</h1>
        <p>Explora el catálogo y pregúntale a nuestro asistente lo que necesites.</p>
    </div>

    <!-- Botón del Chat Widget -->
    <button id="chat-button" class="chat-bubble">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-message-circle"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-7.6 8.38 8.38 0 0 1 3.8.9L22 4l-1.5 6.5z"></path></svg>
    </button>

    <!-- Ventana del Chat -->
    <div id="chat-window" class="chat-window hidden">
        <div class="chat-header">
            <div class="bot-info">
                <div class="avatar">🤖</div>
                <div>
                    <h3>Asistente Pro</h3>
                    <p>En línea • Inteligencia Artificial</p>
                </div>
            </div>
            <button id="close-chat" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        
        <div id="chat-messages" class="chat-messages">
            <div class="message bot">
                ¡Hola! Soy tu asistente personal de ventas. ¿En qué puedo ayudarte hoy para encontrar el producto ideal?
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Pregúntame algo..." autocomplete="off">
            <button id="send-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-send"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
