<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce con Asistente IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="hero">
        <h1>Bienvenido a Nuestra Tienda Premium</h1>
        <p>Explora el catálogo y pregúntale a nuestro asistente lo que necesites.</p>
    </div>

    <!-- Botón del Chat Widget con el Robotito -->
    <button id="chat-button" class="chat-bubble">
        <img id="bubble-logo" src="" alt="Bit" style="width: 70%; height: 70%; object-fit: contain;">
    </button>

    <!-- Ventana del Chat -->
    <div id="chat-window" class="chat-window hidden">
        <div class="chat-header">
            <div class="bot-info">
                <div class="avatar">
                    <img id="bot-logo" src="" alt="Bit" style="width: 100%; height: 100%; object-fit: contain; border-radius: 12px;">
                </div>
                <div>
                    <h3>Asistente Bit</h3>
                    <p>En línea • Bit Comunicaciones</p>
                </div>
            </div>
            <button id="close-chat" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        
        <div id="chat-messages" class="chat-messages">
            <div class="message bot">
                ¡Hola! Soy tu asistente personal de ventas. ¿En qué puedo ayudarte hoy para encontrar el producto ideal?
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Pregúntame algo..." autocomplete="off">
             <button id="send-btn" style="color: white !important;">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
